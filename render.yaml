services:
  - type: web
    name: knowledge-inbox
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: knowledge-inbox-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_TO
        sync: false
      - key: DEFAULT_USER_ID
        value: "1"
      - key: DASHBOARD_USERNAME
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: INTERNAL_TRIGGER_TOKEN
        sync: false
      - key: APP_TIMEZONE
        value: Europe/Amsterdam
databases:
  - name: knowledge-inbox-db
    plan: free
